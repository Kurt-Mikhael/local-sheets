services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: localsheet
      POSTGRES_USER: localsheet
      POSTGRES_PASSWORD: localsheet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localsheet -d localsheet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
