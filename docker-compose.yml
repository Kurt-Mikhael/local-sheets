services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-localsheet}
      POSTGRES_USER: ${POSTGRES_USER:-localsheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD harus diisi di .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localsheet} -d ${POSTGRES_DB:-localsheet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - localsheet

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-localsheet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-localsheet}?schema=public
      NODE_ENV: production
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - app_logs:/app/logs
    networks:
      - localsheet

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: fe-static
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    networks:
      - localsheet

volumes:
  postgres_data:
  app_logs:

networks:
  localsheet:
    driver: bridge
